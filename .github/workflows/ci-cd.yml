name: MNIST CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r mnist/requirements.txt

    - name: Train model
      run: |
        cd mnist
        python train_ci.py

    - name: Run tests
      run: |
        cd mnist
        python test_model.py

    - name: Upload model artifact
      uses: actions/upload-artifact@v3
      with:
        name: mnist-model
        path: mnist/model_weights/mnist_model_*.pth